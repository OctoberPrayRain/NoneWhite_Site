server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 6m;

  location /api/ {
    proxy_pass http://backend:3000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /uploads/ {
    proxy_pass http://backend:3000/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /internal/openlist/ {
    internal;
    access_log off;
    proxy_pass http://127.0.0.1:5244/;
    proxy_http_version 1.1;
    proxy_pass_request_headers off;
    proxy_set_header Host 127.0.0.1:5244;
    set $openlist_range $http_range;
    if ($openlist_range = "") {
      set $openlist_range "bytes=0-";
    }
    proxy_set_header Range $openlist_range;
    proxy_set_header If-Range $http_if_range;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization "";
    proxy_set_header Cookie "";
    proxy_hide_header Location;
    proxy_hide_header Set-Cookie;
    proxy_hide_header Alt-Svc;
    proxy_hide_header Content-Disposition;
    proxy_hide_header X-Guploader-Response-Body-Transformations;
    proxy_hide_header X-Guploader-Uploadid;
    proxy_hide_header X-Goog-Hash;
    proxy_hide_header X-Goog-Generation;
    proxy_hide_header X-Goog-Metageneration;
    proxy_hide_header X-Goog-Stored-Content-Encoding;
    proxy_hide_header X-Goog-Stored-Content-Length;
    proxy_hide_header X-Goog-Storage-Class;
    proxy_hide_header X-Goog-Request-Id;
    proxy_hide_header X-Goog-Upload-Chunk-Granularity;
    proxy_hide_header X-Goog-Upload-Control-Url;
    proxy_hide_header X-Goog-Upload-Header-Content-Length;
    proxy_hide_header X-Goog-Upload-Header-Content-Type;
    proxy_hide_header X-Goog-Upload-Status;
    proxy_hide_header X-Goog-Upload-URL;
    proxy_intercept_errors on;
    error_page 301 302 303 307 308 =502 /__openlist_redirect_blocked;
  }

  location = /__openlist_redirect_blocked {
    internal;
    return 502;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
