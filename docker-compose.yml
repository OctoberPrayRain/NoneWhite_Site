services:
  mysql:
    image: mysql:8.4
    container_name: nonewhite_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-nonewhite_site}
      MYSQL_USER: ${DB_USER:-nonewhite_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-nonewhite_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-nonewhite_root_password}
    ports:
      - '${DB_PORT:-3306}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
